name: novel_reader
description: A Flutter novel reader with multiple novel sources support
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  html: ^0.15.4
  shared_preferences: ^2.2.2
  json_annotation: ^4.8.1
  cached_network_image: ^3.3.0
  flutter_widget_from_html: ^0.14.11
  permission_handler: ^11.0.1
  path_provider: ^2.1.1
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
